<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to bottom, #f0f2f5, #e6e9ef);
            min-height: 100vh;
        }

        .edit-profile-card {
            max-width: 600px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .edit-profile-card h3 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 500;
        }

        .btn-save {
            width: 100%;
            font-weight: 600;
        }

        .profile-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Travel Journal</a>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="{% url 'explore' %}">Explore</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'write_journal' %}">Write</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="{% url 'profile' %}">Profile</a>
            </li>
        </ul>
    </div>
</nav>

<!-- EDIT PROFILE -->
<div class="edit-profile-card">

    <h3>Edit Profile</h3>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- PROFILE IMAGE PREVIEW -->
        {% if request.user.profile.image %}
            <img src="{{ request.user.profile.image.url }}" class="profile-preview">
        {% else %}
            <img src="{% static 'img/default-avatar.png' %}" class="profile-preview">
        {% endif %}

        <!-- FORM FIELDS -->
        {{ form.non_field_errors }}

        <div class="mb-3">
            {{ form.image.label_tag }}
            {{ form.image }}
        </div>

        <div class="mb-3">
            {{ form.bio.label_tag }}
            {{ form.bio }}
        </div>

        <button type="submit" class="btn btn-primary btn-save">
            Save Changes
        </button>
    </form>

</div>

</body>
</html>
